name: Documentation Linting
run-name: Documentation Linting run by @${{ github.actor }} on ${{ github.ref_name }}

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/docs.yaml"
      - ".markdownlint.json"
      - "**/*.md"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docs.yaml"
      - ".markdownlint.json"
      - "**/*.md"

jobs:
  markdownlint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Markdown formatting
        uses: DavidAnson/markdownlint-cli2-action@v24.0.0
        with:
          globs: "**/*.md"
